AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ECS CI/CD Lab — Abdul Basit Mohammed. Single template: VPC, ECR, Security Groups, VPC Endpoints, IAM, ALB, ECS Fargate (blue/green), CodePipeline, CodeDeploy.

Parameters:
  EnvironmentName:
    Type: String
    Default: ecs-lab

  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.1.0/24
  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.2.0/24
  PrivateSubnet1CIDR:
    Type: String
    Default: 10.0.3.0/24
  PrivateSubnet2CIDR:
    Type: String
    Default: 10.0.4.0/24

  RepositoryName:
    Type: String
    Default: ecs-lab-app

  GitHubOrg:
    Type: String
    Description: GitHub username or organisation that owns the app repo
  AppRepoName:
    Type: String
    Default: ecs-app
    Description: GitHub app repository name — OIDC trust is scoped to this repo
  AppRepoBranch:
    Type: String
    Default: main
    Description: Branch in the app repo that CodePipeline tracks
  CodeStarConnectionArn:
    Type: String
    Description: >
      ARN of the CodeConnections GitHub connection (create in AWS Console under Developer Tools - Connections, then authorize it)

  HealthCheckPath:
    Type: String
    Default: /actuator/health

  ContainerPort:
    Type: Number
    Default: 8080
  Cpu:
    Type: String
    Default: '256'
    AllowedValues: [ '256', '512', '1024', '2048', '4096' ]
  Memory:
    Type: String
    Default: '512'

  BootstrapRepositoryName:
    Type: String
    Default: ecs-lab-bootstrap
    Description: >
      Name of a small, standalone ECR repository — created and seeded manually,
      outside this stack — holding a placeholder image that satisfies the
      /actuator/health check so the initial ECS service can reach steady state.
      CodeDeploy replaces it on first pipeline run.
  BootstrapImageTag:
    Type: String
    Default: latest
    Description: Tag of the placeholder image in BootstrapRepositoryName.

  S3PrefixListId:
    Type: String
    Description: >
      Managed prefix list ID for the regional S3 service (com.amazonaws.<region>.s3).
      ECR image layers are fetched via S3 even through the gateway endpoint, using
      public S3 IP ranges outside the VPC CIDR — the ECS security group needs an
      explicit egress rule to this prefix list or image pulls time out.
      Look up via: aws ec2 describe-managed-prefix-lists --filters
      Name=prefix-list-name,Values=com.amazonaws.<region>.s3

Resources:

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-vpc
      - Key: Project
        Value: ecs-cicd-lab
      - Key: ManagedBy
        Value: cloudformation

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-igw
      - Key: Project
        Value: ecs-cicd-lab

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      CidrBlock: !Ref PublicSubnet1CIDR
      MapPublicIpOnLaunch: true
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-public-1
      - Key: Tier
        Value: public

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      CidrBlock: !Ref PublicSubnet2CIDR
      MapPublicIpOnLaunch: true
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-public-2
      - Key: Tier
        Value: public

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      CidrBlock: !Ref PrivateSubnet1CIDR
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-private-1
      - Key: Tier
        Value: private

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      CidrBlock: !Ref PrivateSubnet2CIDR
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-private-2
      - Key: Tier
        Value: private

  NatGateway1EIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-eip-1

  NatGateway2EIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-eip-2

  NatGateway1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGateway1EIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-nat-1
      - Key: Project
        Value: ecs-cicd-lab

  NatGateway2:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGateway2EIP.AllocationId
      SubnetId: !Ref PublicSubnet2
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-nat-2
      - Key: Project
        Value: ecs-cicd-lab

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-public-rt

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-private-rt-1

  PrivateRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway1

  PrivateSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      SubnetId: !Ref PrivateSubnet1

  PrivateRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-private-rt-2

  PrivateRoute2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway2

  PrivateSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable2
      SubnetId: !Ref PrivateSubnet2

  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref RepositoryName
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: IMMUTABLE
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 immutable sha- tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPrefixList": ["sha-"],
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              },
              {
                "rulePriority": 2,
                "description": "Expire untagged images after 1 day",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 1
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-ecr
      - Key: Project
        Value: ecs-cicd-lab
      - Key: ManagedBy
        Value: cloudformation

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${EnvironmentName}-alb-sg
      GroupDescription: ALB - HTTP/HTTPS from internet; port 8080 for blue/green test listener
      VpcId: !Ref VPC
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 80
        ToPort: 80
        CidrIp: 0.0.0.0/0
        Description: HTTP production traffic
      - IpProtocol: tcp
        FromPort: 8080
        ToPort: 8080
        CidrIp: 0.0.0.0/0
        Description: Test listener for CodeDeploy blue/green validation
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-alb-sg
      - Key: Project
        Value: ecs-cicd-lab

  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${EnvironmentName}-ecs-sg
      GroupDescription: ECS tasks - accept app traffic from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: !Ref ContainerPort
        ToPort: !Ref ContainerPort
        SourceSecurityGroupId: !Ref AlbSecurityGroup
        Description: App port from ALB only
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-ecs-sg
      - Key: Project
        Value: ecs-cicd-lab

  AlbEgressToEcs:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref AlbSecurityGroup
      IpProtocol: tcp
      FromPort: !Ref ContainerPort
      ToPort: !Ref ContainerPort
      DestinationSecurityGroupId: !Ref EcsSecurityGroup
      Description: ALB forwards traffic to ECS tasks only

  EcsEgressToEndpoints:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref EcsSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: !Ref VpcCIDR
      Description: HTTPS to VPC endpoints (ECR, CloudWatch, SSM)

  EcsEgressToS3:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref EcsSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      DestinationPrefixListId: !Ref S3PrefixListId
      Description: HTTPS to S3 gateway endpoint (ECR image layers)

  EndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${EnvironmentName}-endpoint-sg
      GroupDescription: VPC interface endpoints - HTTPS from ECS tasks
      VpcId: !Ref VPC
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 443
        ToPort: 443
        SourceSecurityGroupId: !Ref EcsSecurityGroup
        Description: HTTPS from ECS tasks
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-endpoint-sg
      - Key: Project
        Value: ecs-cicd-lab

  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      VpcId: !Ref VPC
      RouteTableIds:
      - !Ref PrivateRouteTable1
      - !Ref PrivateRouteTable2

  EcrApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ecr.api
      VpcEndpointType: Interface
      VpcId: !Ref VPC
      SubnetIds:
      - !Ref PrivateSubnet1
      - !Ref PrivateSubnet2
      SecurityGroupIds:
      - !Ref EndpointSecurityGroup
      PrivateDnsEnabled: true

  EcrDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ecr.dkr
      VpcEndpointType: Interface
      VpcId: !Ref VPC
      SubnetIds:
      - !Ref PrivateSubnet1
      - !Ref PrivateSubnet2
      SecurityGroupIds:
      - !Ref EndpointSecurityGroup
      PrivateDnsEnabled: true

  CloudWatchLogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.logs
      VpcEndpointType: Interface
      VpcId: !Ref VPC
      SubnetIds:
      - !Ref PrivateSubnet1
      - !Ref PrivateSubnet2
      SecurityGroupIds:
      - !Ref EndpointSecurityGroup
      PrivateDnsEnabled: true

  SsmEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ssm
      VpcEndpointType: Interface
      VpcId: !Ref VPC
      SubnetIds:
      - !Ref PrivateSubnet1
      - !Ref PrivateSubnet2
      SecurityGroupIds:
      - !Ref EndpointSecurityGroup
      PrivateDnsEnabled: true

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-github-actions-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Federated: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
          Action: sts:AssumeRoleWithWebIdentity
          Condition:
            StringEquals:
              token.actions.githubusercontent.com:aud: sts.amazonaws.com
            StringLike:
              token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${AppRepoName}:*
      Policies:
      - PolicyName: ECRPushPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Sid: ECRAuth
            Effect: Allow
            Action:
            - ecr:GetAuthorizationToken
            Resource: '*'
          - Sid: ECRPush
            Effect: Allow
            Action:
            - ecr:BatchCheckLayerAvailability
            - ecr:GetDownloadUrlForLayer
            - ecr:BatchGetImage
            - ecr:PutImage
            - ecr:InitiateLayerUpload
            - ecr:UploadLayerPart
            - ecr:CompleteLayerUpload
            - ecr:DescribeImages
            Resource: !GetAtt EcrRepository.Arn
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-ecs-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: ecs-tasks.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: ECRAndLogs
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - ecr:GetAuthorizationToken
            Resource: '*'
          - Effect: Allow
            Action:
            - ecr:BatchCheckLayerAvailability
            - ecr:GetDownloadUrlForLayer
            - ecr:BatchGetImage
            Resource:
            - !GetAtt EcrRepository.Arn
            - !Sub arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${BootstrapRepositoryName}
          - Effect: Allow
            Action:
            - logs:CreateLogStream
            - logs:PutLogEvents
            Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/${EnvironmentName}-app:*
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-ecs-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: ecs-tasks.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: ECSExec
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - ssmmessages:CreateControlChannel
            - ssmmessages:CreateDataChannel
            - ssmmessages:OpenControlChannel
            - ssmmessages:OpenDataChannel
            Resource: '*'
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-codepipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: codepipeline.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: PipelinePolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:GetObjectVersion
            - s3:PutObject
            - s3:GetBucketVersioning
            Resource:
            - !GetAtt ArtifactBucket.Arn
            - !Sub ${ArtifactBucket.Arn}/*
          - Effect: Allow
            Action:
            - codestar-connections:UseConnection
            - codeconnections:UseConnection
            Resource: !Ref CodeStarConnectionArn
          - Effect: Allow
            Action:
            - codedeploy:CreateDeployment
            - codedeploy:GetApplication
            - codedeploy:GetDeployment
            - codedeploy:GetDeploymentConfig
            - codedeploy:GetApplicationRevision
            - codedeploy:RegisterApplicationRevision
            Resource: '*'
          - Effect: Allow
            Action:
            - ecs:RegisterTaskDefinition
            - ecs:DescribeTaskDefinition
            - ecs:DescribeServices
            Resource: '*'
          - Effect: Allow
            Action:
            - iam:PassRole
            Resource:
            - !GetAtt EcsTaskExecutionRole.Arn
            - !GetAtt EcsTaskRole.Arn
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-eventbridge-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: events.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: StartPipeline
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - codepipeline:StartPipelineExecution
            Resource: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${EnvironmentName}-pipeline
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  CodeDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-codedeploy-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: codedeploy.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/AWSCodeDeployRoleForECS
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${EnvironmentName}-alb
      Scheme: internet-facing
      Type: application
      Subnets:
      - !Ref PublicSubnet1
      - !Ref PublicSubnet2
      SecurityGroups:
      - !Ref AlbSecurityGroup
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-alb
      - Key: Project
        Value: ecs-cicd-lab

  TargetGroupBlue:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${EnvironmentName}-tg-blue
      Protocol: HTTP
      Port: !Ref ContainerPort
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      TargetGroupAttributes:
      - Key: deregistration_delay.timeout_seconds
        Value: '30'
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-tg-blue

  TargetGroupGreen:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${EnvironmentName}-tg-green
      Protocol: HTTP
      Port: !Ref ContainerPort
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      TargetGroupAttributes:
      - Key: deregistration_delay.timeout_seconds
        Value: '30'
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-tg-green

  ProductionListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
      - Type: forward
        TargetGroupArn: !Ref TargetGroupBlue

  TestListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTP
      Port: 8080
      DefaultActions:
      - Type: forward
        TargetGroupArn: !Ref TargetGroupGreen

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${EnvironmentName}-app
      RetentionInDays: 30
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${EnvironmentName}-cluster
      ClusterSettings:
      - Name: containerInsights
        Value: enabled
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-cluster
      - Key: Project
        Value: ecs-cicd-lab

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${EnvironmentName}-app
      NetworkMode: awsvpc
      RequiresCompatibilities:
      - FARGATE
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
      - Name: app
        Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${BootstrapRepositoryName}:${BootstrapImageTag}'
        PortMappings:
        - ContainerPort: !Ref ContainerPort
          Protocol: tcp
        Essential: true
        LogConfiguration:
          LogDriver: awslogs
          Options:
            awslogs-group: !Ref CloudWatchLogGroup
            awslogs-region: !Ref AWS::Region
            awslogs-stream-prefix: ecs
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  EcsService:
    Type: AWS::ECS::Service
    DependsOn:
    - ProductionListener
    - TestListener
    Properties:
      ServiceName: !Sub ${EnvironmentName}-service
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      DeploymentController:
        Type: CODE_DEPLOY
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
          SecurityGroups:
          - !Ref EcsSecurityGroup
      LoadBalancers:
      - ContainerName: app
        ContainerPort: !Ref ContainerPort
        TargetGroupArn: !Ref TargetGroupBlue
      HealthCheckGracePeriodSeconds: 120
      EnableExecuteCommand: true
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-service
      - Key: Project
        Value: ecs-cicd-lab

  AutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn: EcsService
    Properties:
      MinCapacity: 1
      MaxCapacity: 4
      ResourceId: !Sub
        - service/${ClusterName}/${ServiceName}
        - ClusterName: !Ref EcsCluster
          ServiceName: !GetAtt EcsService.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !Sub arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService

  CpuScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub ${EnvironmentName}-cpu-scaling
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${EnvironmentName}-artifacts-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  ArtifactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Deny
          Principal: '*'
          Action: 's3:*'
          Resource:
          - !GetAtt ArtifactBucket.Arn
          - !Sub ${ArtifactBucket.Arn}/*
          Condition:
            Bool:
              aws:SecureTransport: 'false'

  CodeDeployApplication:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: !Sub ${EnvironmentName}-codedeploy-app
      ComputePlatform: ECS

  CodeDeployDeploymentGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployApplication
      DeploymentGroupName: !Sub ${EnvironmentName}-deployment-group
      ServiceRoleArn: !GetAtt CodeDeployRole.Arn
      DeploymentConfigName: CodeDeployDefault.ECSAllAtOnce
      DeploymentStyle:
        DeploymentType: BLUE_GREEN
        DeploymentOption: WITH_TRAFFIC_CONTROL
      BlueGreenDeploymentConfiguration:
        TerminateBlueInstancesOnDeploymentSuccess:
          Action: TERMINATE
          TerminationWaitTimeInMinutes: 5
        DeploymentReadyOption:
          ActionOnTimeout: CONTINUE_DEPLOYMENT
          WaitTimeInMinutes: 0
      ECSServices:
      - ClusterName: !Ref EcsCluster
        ServiceName: !GetAtt EcsService.Name
      LoadBalancerInfo:
        TargetGroupPairInfoList:
        - ProdTrafficRoute:
            ListenerArns:
            - !Ref ProductionListener
          TestTrafficRoute:
            ListenerArns:
            - !Ref TestListener
          TargetGroups:
          - Name: !GetAtt TargetGroupBlue.TargetGroupName
          - Name: !GetAtt TargetGroupGreen.TargetGroupName

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${EnvironmentName}-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
      - Name: Source
        Actions:
        - Name: DeploymentArtifacts
          ActionTypeId:
            Category: Source
            Owner: AWS
            Provider: CodeStarSourceConnection
            Version: '1'
          Configuration:
            ConnectionArn: !Ref CodeStarConnectionArn
            FullRepositoryId: !Sub ${GitHubOrg}/${AppRepoName}
            BranchName: !Ref AppRepoBranch
            DetectChanges: 'false'
            OutputArtifactFormat: CODE_ZIP
          OutputArtifacts:
          - Name: SourceArtifact
          RunOrder: 1
      - Name: Deploy
        Actions:
        - Name: BlueGreenDeploy
          ActionTypeId:
            Category: Deploy
            Owner: AWS
            Provider: CodeDeployToECS
            Version: '1'
          Configuration:
            ApplicationName: !Ref CodeDeployApplication
            DeploymentGroupName: !Ref CodeDeployDeploymentGroup
            TaskDefinitionTemplateArtifact: SourceArtifact
            TaskDefinitionTemplatePath: taskdef.json
            AppSpecTemplateArtifact: SourceArtifact
            AppSpecTemplatePath: appspec.json
            Image1ArtifactName: SourceArtifact
            Image1ContainerName: IMAGE1_NAME
          InputArtifacts:
          - Name: SourceArtifact
          RunOrder: 1

  EcrPushEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${EnvironmentName}-ecr-push-trigger
      Description: Trigger CodePipeline on every successful ECR image push
      EventPattern:
        source:
        - aws.ecr
        detail-type:
        - ECR Image Action
        detail:
          action-type:
          - PUSH
          result:
          - SUCCESS
          repository-name:
          - !Ref EcrRepository
      State: ENABLED
      Targets:
      - Id: TriggerPipeline
        Arn: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${EnvironmentName}-pipeline
        RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  AlbEndpoint:
    Description: Public URL — open this in a browser after the first deployment
    Value: !Sub http://${ApplicationLoadBalancer.DNSName}

  EcrRepositoryUri:
    Description: ECR URI — use in docker build/push commands
    Value: !GetAtt EcrRepository.RepositoryUri

  GitHubActionsRoleArn:
    Description: Set this as the AWS_ROLE_ARN variable in your GitHub Actions app repo
    Value: !GetAtt GitHubActionsRole.Arn

  PipelineName:
    Value: !Ref Pipeline

  EcsClusterName:
    Value: !Ref EcsCluster

  EcsServiceName:
    Value: !GetAtt EcsService.Name

  ExecutionRoleArn:
    Description: ECS Task Execution Role ARN - used in taskdef.json (generated by GitHub Actions)
    Value: !GetAtt EcsTaskExecutionRole.Arn

  TaskRoleArn:
    Description: ECS Task Role ARN - used in taskdef.json (generated by GitHub Actions)
    Value: !GetAtt EcsTaskRole.Arn
