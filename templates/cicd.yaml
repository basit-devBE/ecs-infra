AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ECS CI/CD Lab — CI/CD nested stack. Artifact bucket, CodeDeploy blue/green, CodePipeline, EventBridge trigger.

Parameters:
  EnvironmentName:
    Type: String
  EcrRepositoryName:
    Type: String
  CodePipelineRoleArn:
    Type: String
  CodeBuildRoleArn:
    Type: String
  CodeDeployRoleArn:
    Type: String
  EventBridgeRoleArn:
    Type: String
  EcsTaskExecutionRoleArn:
    Type: String
  EcsTaskRoleArn:
    Type: String
  EcsClusterName:
    Type: String
  EcsServiceName:
    Type: String
  ProductionListenerArn:
    Type: String
  TestListenerArn:
    Type: String
  TargetGroupBlueName:
    Type: String
  TargetGroupGreenName:
    Type: String

Resources:

  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${EnvironmentName}-artifacts-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  ArtifactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Deny
          Principal: '*'
          Action: 's3:*'
          Resource:
          - !GetAtt ArtifactBucket.Arn
          - !Sub ${ArtifactBucket.Arn}/*
          Condition:
            Bool:
              aws:SecureTransport: 'false'

  CodeDeployApplication:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: !Sub ${EnvironmentName}-codedeploy-app
      ComputePlatform: ECS

  CodeDeployDeploymentGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployApplication
      DeploymentGroupName: !Sub ${EnvironmentName}-deployment-group
      ServiceRoleArn: !Ref CodeDeployRoleArn
      DeploymentConfigName: CodeDeployDefault.ECSAllAtOnce
      DeploymentStyle:
        DeploymentType: BLUE_GREEN
        DeploymentOption: WITH_TRAFFIC_CONTROL
      BlueGreenDeploymentConfiguration:
        TerminateBlueInstancesOnDeploymentSuccess:
          Action: TERMINATE
          TerminationWaitTimeInMinutes: 5
        DeploymentReadyOption:
          ActionOnTimeout: CONTINUE_DEPLOYMENT
          WaitTimeInMinutes: 0
      ECSServices:
      - ClusterName: !Ref EcsClusterName
        ServiceName: !Ref EcsServiceName
      LoadBalancerInfo:
        TargetGroupPairInfoList:
        - ProdTrafficRoute:
            ListenerArns:
            - !Ref ProductionListenerArn
          TestTrafficRoute:
            ListenerArns:
            - !Ref TestListenerArn
          TargetGroups:
          - Name: !Ref TargetGroupBlueName
          - Name: !Ref TargetGroupGreenName

  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${EnvironmentName}-build
      Description: Generates taskdef.json and appspec.yaml for the CodeDeploy ECS deployment
      ServiceRole: !Ref CodeBuildRoleArn
      Source:
        Type: CODEPIPELINE
        BuildSpec: !Sub
          - |
            version: 0.2
            phases:
              build:
                commands:
                  - |
                    jq -n \
                      --arg executionRole "$TASK_EXECUTION_ROLE_ARN" \
                      --arg taskRole "$TASK_ROLE_ARN" \
                      '{
                        family: "${EnvName}-app",
                        networkMode: "awsvpc",
                        requiresCompatibilities: ["FARGATE"],
                        cpu: "256",
                        memory: "512",
                        executionRoleArn: $executionRole,
                        taskRoleArn: $taskRole,
                        containerDefinitions: [{
                          name: "app",
                          image: "IMAGE1_NAME",
                          portMappings: [{ containerPort: 8080, protocol: "tcp" }],
                          essential: true,
                          logConfiguration: {
                            logDriver: "awslogs",
                            options: {
                              "awslogs-group": "/ecs/${EnvName}-app",
                              "awslogs-region": "${AWS::Region}",
                              "awslogs-stream-prefix": "ecs"
                            }
                          }
                        }]
                      }' > taskdef.json
                  - |
                    cat > appspec.yaml << 'APPSPEC_EOF'
                    version: 0.0
                    Resources:
                      - TargetService:
                          Type: AWS::ECS::Service
                          Properties:
                            TaskDefinition: "<TASK_DEFINITION>"
                            LoadBalancerInfo:
                              ContainerName: "app"
                              ContainerPort: 8080
                    APPSPEC_EOF
            artifacts:
              files:
                - taskdef.json
                - appspec.yaml
          - EnvName: !Ref EnvironmentName
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
        - Name: TASK_EXECUTION_ROLE_ARN
          Value: !Ref EcsTaskExecutionRoleArn
        - Name: TASK_ROLE_ARN
          Value: !Ref EcsTaskRoleArn
      Artifacts:
        Type: CODEPIPELINE
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${EnvironmentName}-pipeline
      RoleArn: !Ref CodePipelineRoleArn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
      - Name: Source
        Actions:
        - Name: ImageSource
          ActionTypeId:
            Category: Source
            Owner: AWS
            Provider: ECR
            Version: '1'
          Configuration:
            RepositoryName: !Ref EcrRepositoryName
            ImageTag: latest
          OutputArtifacts:
          - Name: ImageArtifact
          RunOrder: 1
      - Name: Build
        Actions:
        - Name: BuildTaskDef
          ActionTypeId:
            Category: Build
            Owner: AWS
            Provider: CodeBuild
            Version: '1'
          Configuration:
            ProjectName: !Ref CodeBuildProject
          InputArtifacts:
          - Name: ImageArtifact
          OutputArtifacts:
          - Name: DeployArtifact
          RunOrder: 1
      - Name: Deploy
        Actions:
        - Name: BlueGreenDeploy
          ActionTypeId:
            Category: Deploy
            Owner: AWS
            Provider: CodeDeployToECS
            Version: '1'
          Configuration:
            ApplicationName: !Ref CodeDeployApplication
            DeploymentGroupName: !Ref CodeDeployDeploymentGroup
            TaskDefinitionTemplateArtifact: DeployArtifact
            TaskDefinitionTemplatePath: taskdef.json
            AppSpecTemplateArtifact: DeployArtifact
            AppSpecTemplatePath: appspec.yaml
            Image1ArtifactName: ImageArtifact
            Image1ContainerName: IMAGE1_NAME
          InputArtifacts:
          - Name: ImageArtifact
          - Name: DeployArtifact
          RunOrder: 1

  EcrPushEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${EnvironmentName}-ecr-push-trigger
      Description: Trigger CodePipeline on every successful ECR image push
      EventPattern:
        source:
        - aws.ecr
        detail-type:
        - ECR Image Action
        detail:
          action-type:
          - PUSH
          result:
          - SUCCESS
          repository-name:
          - !Ref EcrRepositoryName
      State: ENABLED
      Targets:
      - Id: TriggerPipeline
        Arn: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${EnvironmentName}-pipeline
        RoleArn: !Ref EventBridgeRoleArn

Outputs:
  PipelineName:
    Value: !Ref Pipeline
  ArtifactBucketName:
    Value: !Ref ArtifactBucket
  CodeDeployApplicationName:
    Value: !Ref CodeDeployApplication
  CodeDeployDeploymentGroupName:
    Value: !Ref CodeDeployDeploymentGroup
