AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ECS CI/CD Lab — ALB nested stack. Application Load Balancer, blue/green target groups, listeners.

Parameters:
  EnvironmentName:
    Type: String
  ContainerPort:
    Type: Number
  HealthCheckPath:
    Type: String
  VpcId:
    Type: String
  PublicSubnet1Id:
    Type: String
  PublicSubnet2Id:
    Type: String
  AlbSecurityGroupId:
    Type: String

Resources:

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${EnvironmentName}-alb
      Scheme: internet-facing
      Type: application
      Subnets:
      - !Ref PublicSubnet1Id
      - !Ref PublicSubnet2Id
      SecurityGroups:
      - !Ref AlbSecurityGroupId
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-alb
      - Key: Project
        Value: ecs-cicd-lab

  TargetGroupBlue:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${EnvironmentName}-tg-blue
      Protocol: HTTP
      Port: !Ref ContainerPort
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      TargetGroupAttributes:
      - Key: deregistration_delay.timeout_seconds
        Value: '30'
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-tg-blue

  TargetGroupGreen:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${EnvironmentName}-tg-green
      Protocol: HTTP
      Port: !Ref ContainerPort
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      TargetGroupAttributes:
      - Key: deregistration_delay.timeout_seconds
        Value: '30'
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-tg-green

  ProductionListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
      - Type: forward
        TargetGroupArn: !Ref TargetGroupBlue

  TestListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTP
      Port: 8080
      DefaultActions:
      - Type: forward
        TargetGroupArn: !Ref TargetGroupGreen

Outputs:
  ApplicationLoadBalancerArn:
    Value: !Ref ApplicationLoadBalancer
  ApplicationLoadBalancerDnsName:
    Value: !GetAtt ApplicationLoadBalancer.DNSName
  TargetGroupBlueArn:
    Value: !Ref TargetGroupBlue
  TargetGroupBlueName:
    Value: !GetAtt TargetGroupBlue.TargetGroupName
  TargetGroupGreenArn:
    Value: !Ref TargetGroupGreen
  TargetGroupGreenName:
    Value: !GetAtt TargetGroupGreen.TargetGroupName
  ProductionListenerArn:
    Value: !Ref ProductionListener
  TestListenerArn:
    Value: !Ref TestListener
