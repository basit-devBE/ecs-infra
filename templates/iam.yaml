AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ECS CI/CD Lab — IAM nested stack. All roles: GitHub OIDC (app + infra sync), ECS task/execution,
  CodePipeline, EventBridge, CodeDeploy.

Parameters:
  EnvironmentName:
    Type: String
  GitHubOrg:
    Type: String
  AppRepoName:
    Type: String
  InfraRepoName:
    Type: String
  CodeStarConnectionArn:
    Type: String
  BootstrapRepositoryName:
    Type: String
  EcrRepositoryArn:
    Type: String
  TemplatesBucketName:
    Type: String

Resources:

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-github-actions-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Federated: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
          Action: sts:AssumeRoleWithWebIdentity
          Condition:
            StringEquals:
              token.actions.githubusercontent.com:aud: sts.amazonaws.com
            StringLike:
              token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${AppRepoName}:*
      Policies:
      - PolicyName: ECRPushPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Sid: ECRAuth
            Effect: Allow
            Action:
            - ecr:GetAuthorizationToken
            Resource: '*'
          - Sid: ECRPush
            Effect: Allow
            Action:
            - ecr:BatchCheckLayerAvailability
            - ecr:GetDownloadUrlForLayer
            - ecr:BatchGetImage
            - ecr:PutImage
            - ecr:InitiateLayerUpload
            - ecr:UploadLayerPart
            - ecr:CompleteLayerUpload
            - ecr:DescribeImages
            Resource: !Ref EcrRepositoryArn
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  TemplateSyncRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-template-sync-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Federated: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
          Action: sts:AssumeRoleWithWebIdentity
          Condition:
            StringEquals:
              token.actions.githubusercontent.com:aud: sts.amazonaws.com
            StringLike:
              token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${InfraRepoName}:*
      Policies:
      - PolicyName: SyncTemplatesToS3
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Sid: ListBucket
            Effect: Allow
            Action:
            - s3:ListBucket
            Resource: !Sub arn:aws:s3:::${TemplatesBucketName}
          - Sid: SyncObjects
            Effect: Allow
            Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
            Resource: !Sub arn:aws:s3:::${TemplatesBucketName}/*
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-ecs-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: ecs-tasks.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: ECRAndLogs
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - ecr:GetAuthorizationToken
            Resource: '*'
          - Effect: Allow
            Action:
            - ecr:BatchCheckLayerAvailability
            - ecr:GetDownloadUrlForLayer
            - ecr:BatchGetImage
            Resource:
            - !Ref EcrRepositoryArn
            - !Sub arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${BootstrapRepositoryName}
          - Effect: Allow
            Action:
            - logs:CreateLogStream
            - logs:PutLogEvents
            Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/${EnvironmentName}-app:*
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-ecs-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: ecs-tasks.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: ECSExec
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - ssmmessages:CreateControlChannel
            - ssmmessages:CreateDataChannel
            - ssmmessages:OpenControlChannel
            - ssmmessages:OpenDataChannel
            Resource: '*'
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-codepipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: codepipeline.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: PipelinePolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:GetObjectVersion
            - s3:PutObject
            - s3:GetBucketVersioning
            Resource:
            - !Sub arn:aws:s3:::${EnvironmentName}-artifacts-${AWS::AccountId}
            - !Sub arn:aws:s3:::${EnvironmentName}-artifacts-${AWS::AccountId}/*
          - Effect: Allow
            Action:
            - codestar-connections:UseConnection
            - codeconnections:UseConnection
            Resource: !Ref CodeStarConnectionArn
          - Effect: Allow
            Action:
            - codedeploy:CreateDeployment
            - codedeploy:GetApplication
            - codedeploy:GetDeployment
            - codedeploy:GetDeploymentConfig
            - codedeploy:GetApplicationRevision
            - codedeploy:RegisterApplicationRevision
            Resource: '*'
          - Effect: Allow
            Action:
            - ecs:RegisterTaskDefinition
            - ecs:DescribeTaskDefinition
            - ecs:DescribeServices
            Resource: '*'
          - Effect: Allow
            Action:
            - iam:PassRole
            Resource:
            - !GetAtt EcsTaskExecutionRole.Arn
            - !GetAtt EcsTaskRole.Arn
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-eventbridge-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: events.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: StartPipeline
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - codepipeline:StartPipelineExecution
            Resource: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${EnvironmentName}-pipeline
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  CodeDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-codedeploy-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: codedeploy.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/AWSCodeDeployRoleForECS
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

Outputs:
  GitHubActionsRoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
  TemplateSyncRoleArn:
    Value: !GetAtt TemplateSyncRole.Arn
  EcsTaskExecutionRoleArn:
    Value: !GetAtt EcsTaskExecutionRole.Arn
  EcsTaskRoleArn:
    Value: !GetAtt EcsTaskRole.Arn
  CodePipelineRoleArn:
    Value: !GetAtt CodePipelineRole.Arn
  EventBridgeRoleArn:
    Value: !GetAtt EventBridgeRole.Arn
  CodeDeployRoleArn:
    Value: !GetAtt CodeDeployRole.Arn
