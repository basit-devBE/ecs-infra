AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ECS CI/CD Lab — ECS runtime nested stack. Cluster, task definition, service (blue/green), autoscaling.

Parameters:
  EnvironmentName:
    Type: String
  ContainerPort:
    Type: Number
  Cpu:
    Type: String
  Memory:
    Type: String
  BootstrapRepositoryName:
    Type: String
  BootstrapImageTag:
    Type: String
  PrivateSubnet1Id:
    Type: String
  PrivateSubnet2Id:
    Type: String
  EcsSecurityGroupId:
    Type: String
  EcsTaskExecutionRoleArn:
    Type: String
  EcsTaskRoleArn:
    Type: String
  TargetGroupBlueArn:
    Type: String

Resources:

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${EnvironmentName}-app
      RetentionInDays: 30
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${EnvironmentName}-cluster
      ClusterSettings:
      - Name: containerInsights
        Value: enabled
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-cluster
      - Key: Project
        Value: ecs-cicd-lab

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${EnvironmentName}-app
      NetworkMode: awsvpc
      RequiresCompatibilities:
      - FARGATE
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      ExecutionRoleArn: !Ref EcsTaskExecutionRoleArn
      TaskRoleArn: !Ref EcsTaskRoleArn
      ContainerDefinitions:
      - Name: app
        Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${BootstrapRepositoryName}:${BootstrapImageTag}'
        PortMappings:
        - ContainerPort: !Ref ContainerPort
          Protocol: tcp
        Essential: true
        LogConfiguration:
          LogDriver: awslogs
          Options:
            awslogs-group: !Ref CloudWatchLogGroup
            awslogs-region: !Ref AWS::Region
            awslogs-stream-prefix: ecs
      Tags:
      - Key: Project
        Value: ecs-cicd-lab

  EcsService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub ${EnvironmentName}-service
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      DeploymentController:
        Type: CODE_DEPLOY
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
          - !Ref PrivateSubnet1Id
          - !Ref PrivateSubnet2Id
          SecurityGroups:
          - !Ref EcsSecurityGroupId
      LoadBalancers:
      - ContainerName: app
        ContainerPort: !Ref ContainerPort
        TargetGroupArn: !Ref TargetGroupBlueArn
      HealthCheckGracePeriodSeconds: 120
      EnableExecuteCommand: true
      Tags:
      - Key: Name
        Value: !Sub ${EnvironmentName}-service
      - Key: Project
        Value: ecs-cicd-lab

  AutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn: EcsService
    Properties:
      MinCapacity: 1
      MaxCapacity: 4
      ResourceId: !Sub
        - service/${ClusterName}/${ServiceName}
        - ClusterName: !Ref EcsCluster
          ServiceName: !GetAtt EcsService.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !Sub arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService

  CpuScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub ${EnvironmentName}-cpu-scaling
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

Outputs:
  EcsClusterName:
    Value: !Ref EcsCluster
  EcsServiceName:
    Value: !GetAtt EcsService.Name
  TaskDefinitionArn:
    Value: !Ref TaskDefinition
